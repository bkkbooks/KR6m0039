  - {type: variant, offset: 6820, length: 1, content: 日, 原: 日言下以理不可言雖言猶是不言也莊子雜篇㝢言章云不言言即齊齊與言不齊言與齊不齊故曰言無言言無言終身言未甞言終身不言未甞不言今借此語以明如來雖言而不言如涅槃經云苦知如來當不說法是名菩薩具足多聞中論云諸法不可得滅一切戲論無人亦無處佛亦無所說也今試為于狂言辨之下第二正答難也夫聖心者下辨聖心有無之相也無相者無相貇也彌懃者精進也不可為無故下覆疏上不無也名教諾所不能詺故云絕也是以言知非為知欲以通其鑒下經云聖智即無知者欲明聖智靈鑒虛通無有執著故也經云聖智無智者欲明聖智能通知諸法故也又釋經言聖智有知者非實有知也欲明聖智無所不鑒故言有知耳經言聖}
